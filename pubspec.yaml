name: mobile_pos
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  badges: ^3.0.2
  app_settings: ^5.1.1
  flutter_flip_card: ^0.0.4
  lottie: ^2.2.0

  flutter_svg: ^1.0.3
  google_nav_bar: ^5.0.6
  flashy_tab_bar2: ^0.0.5
  flutter_spinkit: ^5.1.0
  audioplayers: ^6.1.0
  mobile_scanner: ^5.2.3

  cached_network_image: ^3.2.3
  #  call_log: any
  change_app_package_name: ^1.1.0
  connectivity_plus: ^5.0.2
  cron: ^0.5.1
  #  cupertino_icons: ^1.0.5
  date_time_picker: ^2.1.0
  dio: ^5.0.0

  fluttertoast: ^8.1.3
  geolocator: ^9.0.2
  get_ip_address: ^0.0.5
  google_fonts: ^6.2.1
  google_maps_flutter: ^2.2.3
  http: ^1.6.0
  image_picker: ^0.8.6+1
  intl_phone_number_input: any
  material_design_icons_flutter: ^6.0.7096
  path_provider: ^2.0.12
  pdf: ^3.8.4
  permission_handler: ^12.0.0
  printing: ^5.9.3
  provider: ^6.0.5
  qr: ^3.0.1
  qr_flutter: any
  sqflite: ^2.2.4+1
  shared_preferences: ^2.0.17
  search_choices: ^2.2.2
  #  share: ^2.0.4
  syncfusion_flutter_datepicker: ^20.4.50
  url_launcher: ^6.1.9
  video_player: ^2.5.1

  bloc: ^8.1.2
  flutter_bloc: ^8.1.3
  htmltopdfwidgets: ^1.0.2
  sqflite_common_ffi: ^2.3.1
  flutter_inappwebview: ^6.0.0

#  firebase_auth: ^5.3.4
  google_sign_in: ^6.2.2

  encrypt: ^5.0.3
  crypto: ^3.0.3
  geocoding: ^2.1.1
  google_places_flutter: ^2.1.0
  #screenshot: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.12.0

  flutter_lints: ^4.0.0
dependency_overrides:
  intl: ^0.18.1
flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"
  remove_alpha_ios: true

flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
    - assets/svg/
    - assets/fonts/
    - i18n/
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/cairo.ttf
          weight: 700
    - family: IconBroken
      fonts:
        - asset: assets/fonts/icons.ttf

